<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe AI</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* ===== THEMES ===== */
:root {
  --bg:#0a0a1a;--bg2:#12122a;--accent:#7c3aed;--accent2:#a855f7;
  --cell-bg:#1a1a3a;--cell-border:#2d2d5e;--x-color:#f472b6;--o-color:#34d399;
  --text:#e2e8f0;--text-dim:#94a3b8;--shadow:rgba(124,58,237,0.4);
  --font-main:'Orbitron',monospace;--font-body:'Nunito',sans-serif;
}
.theme-0{--bg:#0a0a1a;--bg2:#12122a;--accent:#7c3aed;--accent2:#a855f7;--cell-bg:#1a1a3a;--cell-border:#2d2d5e;--x-color:#f472b6;--o-color:#34d399;--text:#e2e8f0;--text-dim:#94a3b8;--shadow:rgba(124,58,237,0.4);}
.theme-1{--bg:#0d0d0d;--bg2:#1a0a0a;--accent:#ff0080;--accent2:#ff66b2;--cell-bg:#1a0a14;--cell-border:#3d1a2e;--x-color:#00ffff;--o-color:#ffff00;--text:#f0f0f0;--text-dim:#aaa;--shadow:rgba(255,0,128,0.5);}
.theme-2{--bg:#001219;--bg2:#002233;--accent:#0096c7;--accent2:#48cae4;--cell-bg:#002233;--cell-border:#0077b6;--x-color:#90e0ef;--o-color:#f77f00;--text:#e0f4ff;--text-dim:#7bc0e0;--shadow:rgba(0,150,199,0.4);}
.theme-3{--bg:#0a1a0a;--bg2:#0f2a0f;--accent:#22c55e;--accent2:#4ade80;--cell-bg:#0f2010;--cell-border:#1a4020;--x-color:#fbbf24;--o-color:#fb923c;--text:#d1fae5;--text-dim:#6ee7b7;--shadow:rgba(34,197,94,0.4);}
.theme-4{--bg:#1a0500;--bg2:#2a0a00;--accent:#ef4444;--accent2:#f97316;--cell-bg:#2a0a00;--cell-border:#5a1500;--x-color:#fde047;--o-color:#fb923c;--text:#fef2f2;--text-dim:#fca5a5;--shadow:rgba(239,68,68,0.5);}
.theme-5{--bg:#e8f4fd;--bg2:#d0eafa;--accent:#0ea5e9;--accent2:#38bdf8;--cell-bg:#f0f9ff;--cell-border:#bae6fd;--x-color:#0c4a6e;--o-color:#7c3aed;--text:#0c4a6e;--text-dim:#0369a1;--shadow:rgba(14,165,233,0.3);}
.theme-6{--bg:#1a1000;--bg2:#2a1a00;--accent:#d97706;--accent2:#f59e0b;--cell-bg:#2a1a00;--cell-border:#5a3500;--x-color:#fcd34d;--o-color:#a78bfa;--text:#fef3c7;--text-dim:#fbbf24;--shadow:rgba(217,119,6,0.5);}
.theme-7{--bg:#1a0010;--bg2:#2a0020;--accent:#ec4899;--accent2:#f9a8d4;--cell-bg:#220015;--cell-border:#5a003a;--x-color:#fde68a;--o-color:#6ee7b7;--text:#fdf2f8;--text-dim:#f9a8d4;--shadow:rgba(236,72,153,0.4);}
.theme-8{--bg:#111;--bg2:#1c1c1c;--accent:#6b7280;--accent2:#9ca3af;--cell-bg:#1c1c1c;--cell-border:#374151;--x-color:#f9fafb;--o-color:#d1d5db;--text:#f3f4f6;--text-dim:#9ca3af;--shadow:rgba(107,114,128,0.4);}
.theme-9{--bg:#050010;--bg2:#0a0028;--accent:#8b5cf6;--accent2:#c4b5fd;--cell-bg:#0a0028;--cell-border:#1e0050;--x-color:#f0abfc;--o-color:#67e8f9;--text:#ede9fe;--text-dim:#a78bfa;--shadow:rgba(139,92,246,0.5);}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--bg);color:var(--text);font-family:var(--font-body);
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:16px;
  position:relative;overflow-x:hidden;transition:background 0.7s,color 0.7s;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 50%,var(--accent) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 20%,var(--accent2) 0%,transparent 40%);
  opacity:0.07;transition:background 0.7s;
}

/* ===== PAGES ===== */
.page{position:relative;z-index:1;width:100%;max-width:480px;display:none;flex-direction:column;align-items:center;}
.page.active{display:flex;}

/* ==============================
   LOBBY
   ============================== */
#lobbyPage{gap:0;}

.lobby-hero{
  width:100%;aspect-ratio:16/9;max-height:250px;
  border-radius:22px;overflow:hidden;position:relative;
  margin-bottom:24px;box-shadow:0 0 60px var(--shadow);
  border:1px solid var(--cell-border);
}
.lobby-hero-inner{
  width:100%;height:100%;
  background:linear-gradient(135deg,var(--bg2) 0%,var(--bg) 100%);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;position:relative;overflow:hidden;
}
.hero-grid{
  position:absolute;inset:0;display:grid;
  grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  gap:5px;padding:20px;opacity:0.3;
}
.hero-cell{
  background:var(--cell-bg);border:1px solid var(--cell-border);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-main);font-size:clamp(0.9rem,2.5vw,1.5rem);font-weight:900;
  animation:heroPulse 4s ease-in-out infinite;
}
.hero-cell:nth-child(1){color:var(--x-color);animation-delay:0s;}
.hero-cell:nth-child(2){color:var(--o-color);animation-delay:0.3s;}
.hero-cell:nth-child(3){color:var(--x-color);animation-delay:0.6s;}
.hero-cell:nth-child(4){color:var(--o-color);animation-delay:0.9s;}
.hero-cell:nth-child(5){color:var(--accent2);font-size:clamp(1.2rem,3.5vw,1.8rem);animation-delay:1.2s;}
.hero-cell:nth-child(6){color:var(--x-color);animation-delay:1.5s;}
.hero-cell:nth-child(7){color:var(--o-color);animation-delay:1.8s;}
.hero-cell:nth-child(8){color:var(--x-color);animation-delay:2.1s;}
.hero-cell:nth-child(9){color:var(--o-color);animation-delay:2.4s;}
@keyframes heroPulse{0%,100%{opacity:0.4;transform:scale(0.95);}50%{opacity:1;transform:scale(1.02);}}

.hero-title{
  position:relative;z-index:1;font-family:var(--font-main);font-weight:900;
  font-size:clamp(1.5rem,5.5vw,2.4rem);letter-spacing:4px;text-align:center;
  background:linear-gradient(135deg,var(--accent),var(--accent2),var(--x-color));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px var(--shadow));animation:titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow{0%,100%{filter:drop-shadow(0 0 20px var(--shadow));}50%{filter:drop-shadow(0 0 40px var(--shadow));}}
.hero-sub{position:relative;z-index:1;font-size:0.75rem;letter-spacing:3px;color:var(--text-dim);font-family:var(--font-main);}

.lobby-section-label{
  font-family:var(--font-main);font-size:0.65rem;letter-spacing:3px;
  color:var(--text-dim);margin-bottom:10px;align-self:flex-start;
}

/* Lobby theme dots */
.lobby-theme-strip{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:6px;}
.theme-dot{
  width:26px;height:26px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform 0.2s,border-color 0.2s;
  box-shadow:0 0 8px rgba(0,0,0,0.4);
}
.theme-dot:hover{transform:scale(1.2);}
.theme-dot.active-dot{border-color:#fff;transform:scale(1.25);}
.lobby-theme-name{font-size:0.7rem;letter-spacing:2px;color:var(--text-dim);margin-bottom:20px;}

/* Game list */
.game-list{width:100%;display:flex;flex-direction:column;gap:10px;margin-bottom:10px;}
.game-card{
  width:100%;padding:16px 20px;background:var(--bg2);
  border:1px solid var(--cell-border);border-radius:16px;
  display:flex;align-items:center;gap:16px;cursor:pointer;
  box-shadow:0 0 20px rgba(0,0,0,0.3);position:relative;overflow:hidden;
  transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;
}
.game-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),var(--accent2));opacity:0;transition:opacity 0.2s;}
.game-card:hover{transform:translateY(-3px) scale(1.01);border-color:var(--accent);box-shadow:0 8px 40px var(--shadow);}
.game-card:hover::before{opacity:0.06;}
.game-card-icon{font-size:2rem;filter:drop-shadow(0 0 10px var(--shadow));position:relative;z-index:1;flex-shrink:0;}
.game-card-info{position:relative;z-index:1;flex:1;}
.game-card-name{font-family:var(--font-main);font-weight:900;font-size:0.95rem;letter-spacing:2px;color:var(--accent2);margin-bottom:4px;}
.game-card-desc{font-size:0.76rem;color:var(--text-dim);line-height:1.4;}
.game-card-arrow{position:relative;z-index:1;font-size:1.4rem;color:var(--accent);transition:transform 0.2s;}
.game-card:hover .game-card-arrow{transform:translateX(5px);}

/* ==============================
   GAME PAGE
   ============================== */
#gamePage{gap:12px;}

.game-topbar{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.back-btn{
  background:var(--bg2);border:1px solid var(--cell-border);color:var(--accent2);
  font-family:var(--font-main);font-size:0.65rem;letter-spacing:2px;
  padding:7px 13px;border-radius:10px;cursor:pointer;transition:all 0.2s;
}
.back-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.game-title{font-family:var(--font-main);font-size:0.9rem;letter-spacing:3px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.icon-btn{background:var(--bg2);border:1px solid var(--cell-border);padding:7px 12px;border-radius:10px;cursor:pointer;font-size:1rem;transition:all 0.2s;}
.icon-btn:hover{border-color:var(--accent);transform:scale(1.1);}

.level-panel{display:flex;gap:6px;background:var(--bg2);border:1px solid var(--cell-border);border-radius:14px;padding:5px;box-shadow:0 0 18px var(--shadow);}
.level-btn{font-family:var(--font-body);font-weight:700;font-size:0.78rem;padding:7px 15px;border:none;border-radius:9px;cursor:pointer;background:transparent;color:var(--text-dim);letter-spacing:1px;transition:all 0.2s;}
.level-btn:hover{background:var(--cell-bg);color:var(--accent2);}
.level-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 0 12px var(--shadow);transform:scale(1.04);}

.score-board{display:flex;gap:12px;align-items:center;}
.score-card{background:var(--bg2);border:1px solid var(--cell-border);border-radius:12px;padding:8px 16px;text-align:center;box-shadow:0 0 12px var(--shadow);min-width:70px;}
.score-card .label{font-size:0.6rem;letter-spacing:2px;color:var(--text-dim);font-family:var(--font-main);margin-bottom:3px;}
.score-card .val{font-family:var(--font-main);font-size:1.3rem;font-weight:900;color:var(--accent2);}
.score-card.player .val{color:var(--x-color);}
.score-card.ai-score .val{color:var(--o-color);}

.status{font-family:var(--font-main);font-size:0.82rem;letter-spacing:2px;color:var(--accent2);text-align:center;min-height:22px;filter:drop-shadow(0 0 8px var(--shadow));}

.thinking{display:none;gap:5px;align-items:center;}
.thinking.active{display:flex;}
.thinking span{width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:thinkDot 1s ease-in-out infinite;}
.thinking span:nth-child(2){animation-delay:0.15s;}
.thinking span:nth-child(3){animation-delay:0.3s;}
.think-label{margin-left:6px;font-size:0.72rem;color:var(--text-dim);}
@keyframes thinkDot{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1.2);opacity:1;}}

.board{
  display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:13px;
  background:var(--bg2);border:1px solid var(--cell-border);border-radius:20px;
  box-shadow:0 0 40px var(--shadow),inset 0 0 20px rgba(0,0,0,0.2);
}
.cell{
  width:106px;height:106px;background:var(--cell-bg);border:2px solid var(--cell-border);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:2.7rem;font-weight:900;font-family:var(--font-main);cursor:pointer;
  position:relative;overflow:hidden;transition:transform 0.15s,box-shadow 0.15s,border-color 0.15s;
}
.cell:hover:not(.taken){transform:scale(1.05);border-color:var(--accent);box-shadow:0 0 20px var(--shadow);}
.cell.taken{cursor:default;}
.cell::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,255,255,0.04),transparent 70%);pointer-events:none;}
.cell .mark{display:inline-block;animation:markPop 0.25s cubic-bezier(0.175,0.885,0.32,1.275) forwards;transform:scale(0);}
@keyframes markPop{to{transform:scale(1);}}
.cell[data-mark="X"] .mark{color:var(--x-color);filter:drop-shadow(0 0 8px var(--x-color));}
.cell[data-mark="O"] .mark{color:var(--o-color);filter:drop-shadow(0 0 8px var(--o-color));}
.cell.win-cell{animation:winFlash 0.5s ease forwards;border-color:var(--accent2)!important;box-shadow:0 0 24px var(--accent2),inset 0 0 12px rgba(255,255,255,0.05)!important;}
@keyframes winFlash{0%{transform:scale(1);}40%{transform:scale(1.12);}70%{transform:scale(0.97);}100%{transform:scale(1.05);}}

.btn-row{display:flex;gap:9px;}
.btn{font-family:var(--font-main);font-size:0.68rem;letter-spacing:2px;padding:9px 18px;border:1px solid var(--accent);border-radius:10px;background:transparent;color:var(--accent2);cursor:pointer;transition:all 0.2s;box-shadow:0 0 10px var(--shadow);}
.btn:hover{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 0 22px var(--shadow);transform:scale(1.04);}

/* ===== THEME PICKER MODAL ===== */
.modal-overlay{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.78);backdrop-filter:blur(7px);}
.modal-box{
  position:relative;z-index:1;background:var(--bg2);border:1px solid var(--cell-border);
  border-radius:22px;padding:26px;width:min(400px,90vw);
  box-shadow:0 0 60px var(--shadow);animation:modalIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes modalIn{from{transform:scale(0.85);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-title{font-family:var(--font-main);font-size:0.85rem;letter-spacing:3px;color:var(--accent2);margin-bottom:18px;text-align:center;}
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
.theme-option{
  padding:11px 13px;border-radius:12px;border:2px solid var(--cell-border);
  background:var(--cell-bg);cursor:pointer;display:flex;align-items:center;gap:9px;transition:all 0.2s;
}
.theme-option:hover{border-color:var(--accent);transform:scale(1.03);box-shadow:0 0 14px var(--shadow);}
.theme-option.selected{border-color:var(--accent2);box-shadow:0 0 18px var(--shadow);}
.t-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;}
.t-name{font-size:0.69rem;letter-spacing:1px;color:var(--text);font-weight:700;}
.modal-close{margin-top:16px;width:100%;padding:11px;font-family:var(--font-main);font-size:0.72rem;letter-spacing:3px;border:1px solid var(--cell-border);border-radius:11px;background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.2s;}
.modal-close:hover{border-color:var(--accent);color:var(--accent2);}

/* ===== CROWN OVERLAY ===== */
.crown-overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;pointer-events:none;opacity:0;transition:opacity 0.3s;}
.crown-overlay.show{opacity:1;pointer-events:all;}
.crown-backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(8px);}
.confetti-container{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.confetti-piece{position:absolute;top:-10px;border-radius:2px;animation:confettiFall linear forwards;}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
.crown-content{position:relative;z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:13px;}
.crown-emoji{font-size:5.5rem;animation:crownBounce 0.8s cubic-bezier(0.175,0.885,0.32,1.275) 0.2s both,crownFloat 2s ease-in-out 1s infinite;}
@keyframes crownBounce{from{transform:scale(0) rotate(-20deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
@keyframes crownFloat{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-12px) rotate(3deg);}}
.crown-text{font-family:var(--font-main);font-size:clamp(1.2rem,4.5vw,1.9rem);font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,gold,#fff,gold);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:slideUp 0.5s ease 0.4s both;}
.crown-sub{font-size:0.85rem;color:var(--text-dim);letter-spacing:1px;animation:slideUp 0.5s ease 0.6s both;}
.crown-new-theme{font-size:0.72rem;letter-spacing:2px;color:var(--accent2);animation:slideUp 0.5s ease 0.7s both;background:var(--bg2);padding:7px 16px;border-radius:18px;border:1px solid var(--cell-border);}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.btn-play-again{font-family:var(--font-main);font-size:0.85rem;letter-spacing:3px;padding:13px 32px;border:none;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;cursor:pointer;animation:slideUp 0.5s ease 0.8s both;box-shadow:0 0 28px var(--shadow);transition:transform 0.2s,box-shadow 0.2s;}
.btn-play-again:hover{transform:scale(1.06);box-shadow:0 0 50px var(--shadow);}

@media(max-width:380px){
  .cell{width:88px;height:88px;font-size:2.2rem;}
  .board{gap:7px;padding:10px;}
}
</style>
</head>
<body class="theme-0">

<!-- ============================================================ LOBBY -->
<div class="page active" id="lobbyPage">

  <div class="lobby-hero">
    <div class="lobby-hero-inner">
      <div class="hero-grid">
        <div class="hero-cell">X</div><div class="hero-cell">O</div><div class="hero-cell">X</div>
        <div class="hero-cell">O</div><div class="hero-cell">★</div><div class="hero-cell">O</div>
        <div class="hero-cell">X</div><div class="hero-cell">O</div><div class="hero-cell">X</div>
      </div>
      <div class="hero-title">TIC TAC TOE</div>
      <div class="hero-sub">AI EDITION</div>
    </div>
  </div>

  <div class="lobby-section-label">PILIH TEMA</div>
  <div class="lobby-theme-strip" id="lobbyThemeStrip"></div>
  <div class="lobby-theme-name" id="lobbyThemeName">🌌 COSMIC PURPLE</div>

  <div class="lobby-section-label">PILIH GAME</div>
  <div class="game-list">
    <div class="game-card" onclick="goToGame()">
      <div class="game-card-icon">⭕</div>
      <div class="game-card-info">
        <div class="game-card-name">TIC TAC TOE</div>
        <div class="game-card-desc">3 level AI • Mudah / Sedang / Susah (Minimax AI). Buat 3 simbol berturut-turut!</div>
      </div>
      <div class="game-card-arrow">›</div>
    </div>
  </div>

</div>

<!-- ============================================================ GAME -->
<div class="page" id="gamePage">

  <div class="game-topbar">
    <button class="back-btn" onclick="goToLobby()">← LOBBY</button>
    <div class="game-title">TIC TAC TOE</div>
    <div class="icon-btn" onclick="openThemePicker()" title="Ganti Tema">🎨</div>
  </div>

  <div class="level-panel">
    <button class="level-btn active" onclick="setLevel(0)" id="lv0">MUDAH</button>
    <button class="level-btn" onclick="setLevel(1)" id="lv1">SEDANG</button>
    <button class="level-btn" onclick="setLevel(2)" id="lv2">SUSAH</button>
  </div>

  <div class="score-board">
    <div class="score-card player"><div class="label">KAMU(X)</div><div class="val" id="scorePlayer">0</div></div>
    <div class="score-card"><div class="label">SERI</div><div class="val" id="scoreDraw">0</div></div>
    <div class="score-card ai-score"><div class="label">AI (O)</div><div class="val" id="scoreAI">0</div></div>
  </div>

  <div class="status" id="status">GILIRAN KAMU</div>
  <div class="thinking" id="thinkingDots">
    <span></span><span></span><span></span>
    <span class="think-label">AI BERPIKIR...</span>
  </div>

  <div class="board" id="board">
    <div class="cell" onclick="playerMove(0)"><span class="mark"></span></div>
